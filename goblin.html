<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐸 哥布林模拟器 — 制霸全国</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(180deg,#0d1a0d,#1a2a1a,#0d1a0d);
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  font-family:'Segoe UI','PingFang SC',sans-serif;padding:16px;
}
.container{max-width:560px;width:100%;background:rgba(0,0,0,.4);border:2px solid rgba(80,60,30,.3);border-radius:20px;padding:24px;box-shadow:0 0 60px rgba(0,0,0,.5);}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
h1{color:#8fbc5a;font-size:20px;font-weight:700;text-shadow:0 0 20px rgba(100,150,50,.15);}
.goal{color:rgba(255,255,255,.15);font-size:11px;text-align:center;margin-bottom:8px;}
.goal span{color:#ffd700;}

.cave{
  background:radial-gradient(ellipse at 50% 80%,#2a1a0a,#0d0d05);
  border:2px solid rgba(80,60,30,.2);border-radius:14px;
  height:200px;position:relative;overflow:hidden;margin-bottom:10px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:16px;
}
.cave .gk{font-size:68px;line-height:1;z-index:2;transition:.15s;filter:drop-shadow(0 4px 20px rgba(100,150,50,.2));animation:idle 3s ease-in-out infinite;user-select:none;}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.cave .gk:active{transform:scale(.85)!important;}
.cave .cl{color:rgba(255,255,255,.15);font-size:11px;z-index:2;margin-top:4px;}
.cave .ce{position:absolute;pointer-events:none;font-size:22px;animation:up 1s ease-out forwards;z-index:10;}
@keyframes up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-70px)}}
.cave .gk.shake{animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)rotate(-5deg)}75%{transform:translateX(8px)rotate(5deg)}}

.msg{
  background:rgba(0,0,0,.3);border:1px solid rgba(80,60,30,.15);
  border-radius:10px;padding:10px 12px;min-height:52px;margin-bottom:10px;
  color:rgba(255,255,255,.5);font-size:13px;line-height:1.6;overflow-y:auto;max-height:80px;
}
.msg .s{color:#ffd700;}.msg .h{color:#8fbc5a;}.msg .b{color:#ff6b6b;}.msg .g{color:#b8e080;}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.ab{
  padding:10px;border:1px solid rgba(80,60,30,.2);border-radius:10px;
  background:rgba(255,255,255,.03);color:rgba(255,255,255,.7);
  cursor:pointer;transition:.2s;text-align:center;font-size:13px;line-height:1.3;
}
.ab:hover{border-color:rgba(143,188,90,.3);background:rgba(143,188,90,.06);transform:translateY(-2px);}
.ab:active{transform:scale(.96);}
.ab .ai{font-size:20px;display:block;margin-bottom:2px;}
.ab .ac{font-size:10px;color:rgba(255,255,255,.25);}
.ab.lk{opacity:.35;cursor:not-allowed;}
.ab.lk:hover{transform:none;border-color:rgba(80,60,30,.2);}

.tribe{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;min-height:32px;}
.gu{
  width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;
  background:rgba(100,150,50,.08);border:1px solid rgba(100,150,50,.12);animation:sp .4s ease;position:relative;cursor:pointer;
}
@keyframes sp{0%{transform:scale(0)rotate(-90deg)}100%{transform:scale(1)rotate(0)}}
.gu:hover{background:rgba(100,150,50,.15);}
.gu .t{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;z-index:20;pointer-events:none;}
.gu:hover .t{display:block;}
.pb{height:4px;background:rgba(255,255,255,.05);border-radius:4px;margin-bottom:4px;overflow:hidden;}
.pb .fl{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,#8fbc5a,#ffd700);transition:width .3s;}
.pbt{text-align:right;color:rgba(255,255,255,.12);font-size:10px;margin-bottom:4px;}

/* 结局弹窗 */
.end-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;
  justify-content:center;align-items:center;animation:fadeIn .5s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.end-overlay.show{display:flex;}
.end-box{
  background:linear-gradient(135deg,#1a2a1a,#0d1a0d);border:3px solid #ffd700;
  border-radius:20px;padding:36px;max-width:440px;width:90%;text-align:center;
  box-shadow:0 0 80px rgba(255,215,0,.1);animation:pop .5s ease;
}
@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.end-box .ei{font-size:80px;margin-bottom:8px;}
.end-box h2{color:#ffd700;font-size:26px;margin-bottom:8px;}
.end-box p{color:rgba(255,255,255,.5);font-size:14px;line-height:1.8;margin-bottom:16px;}
.end-box .stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.end-box .stat div{background:rgba(255,255,255,.03);border-radius:8px;padding:8px;}
.end-box .stat .n{color:#ffd700;font-size:22px;font-weight:700;}
.end-box .stat .l{color:rgba(255,255,255,.3);font-size:11px;}
.end-box .btn{
  padding:12px 36px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#ffd700,#f59e0b);color:#1a1a2e;
  font-size:16px;font-weight:700;cursor:pointer;transition:.2s;
}
.end-box .btn:hover{transform:scale(1.04);}

/* 事件通知 */
.event-pop{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:50;
  background:rgba(30,20,10,.95);border:2px solid rgba(255,215,0,.2);
  border-radius:14px;padding:16px 24px;max-width:400px;width:90%;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6);
  display:none;animation:slideDown .4s ease;
}
@keyframes slideDown{0%{transform:translateX(-50%)translateY(-40px);opacity:0}100%{transform:translateX(-50%)translateY(0);opacity:1}}
.event-pop .ei{font-size:40px;margin-bottom:4px;}
.event-pop .et{color:#fff;font-size:16px;font-weight:600;margin-bottom:4px;}
.event-pop .ed{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:10px;}
.event-pop .eb{
  padding:6px 24px;border:none;border-radius:8px;background:linear-gradient(135deg,#8fbc5a,#6a9a3a);
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;
}
.event-pop .eb:hover{transform:scale(1.04);}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🐸 哥布林洞穴</h1>
    <div>
      <div style="color:#ffd700;font-size:16px;font-weight:700">✨ <span id="sc">10</span></div>
      <div style="color:#ff6b6b;font-size:13px">🥩 <span id="mc">5</span></div>
    </div>
  </div>

    <div class="ab" id="raidBtn" onclick="raid()"><span class="ai">⚔️</span>打劫村庄<span class="ac">10✨ → 20~50✨+肉</span></div>

    <div class="ab" id="recBtn" onclick="recruit()"><span class="ai">👶</span>招募哥布林<span class="ac" id="recCost">30✨ 15🥩</span></div>
    <div class="ab" id="upgBtn" onclick="upgrade()"><span class="ai">🛠️</span>升级洞穴<span class="ac" id="upgCost">Lv.1 → 50✨ 25🥩</span></div>
  </div>

  <div class="pb"><div class="fl" id="raidCD" style="width:0%"></div></div>
  <div class="tribe" id="tribe"></div>
</div>

<div class="event-pop" id="eventPop">

  <div class="et" id="evTitle">突发事件！</div>
  <div class="ed" id="evDesc">发生了什么？</div>
  <button class="eb" onclick="closeEvent()">知道了！</button>
</div>

<div class="end-overlay" id="endScreen">
  <div class="end-box">
    <div class="ei">🐲</div>
    <h2>🏆 恭喜通关！</h2>
    <p id="endDesc">你成功制霸了全国！<br>所有村庄都在你的绿皮统治之下！</p>
    <div class="stat">
      <div><div class="n" id="endClicks">0</div><div class="l">点击次数</div></div>
      <div><div class="n" id="endGoblins">0</div><div class="l">哥布林数量</div></div>
      <div><div class="n" id="endLevel">0</div><div class="l">洞穴等级</div></div>
    </div>
    <button class="btn" onclick="location.reload()">🔄 再来一次</button>
  </div>
</div>

  '「我脑子里有两个小人。一个说：去抢劫。另一个说：好！！」','「我好想谈恋爱……跟闪亮亮谈。我们已经老夫老妻了。」',
  '「如果有人问我成功的秘诀，我会说：抢劫。」','「我这一生如履薄冰——不去了，太远，躺平。」',
  '「神说要有光。哥布林说，光有什么用？能抢吗？」','「我上辈子一定是个数学家——每天数闪亮亮！」',
  '「你听说过哥布林经济学吗？就是别人的东西变成自己的东西。」','「不是我不努力，是床把我封印了……等等我没有床？那就是地把我封印了！」',
  '「我昨天做了一个重大决定：今天要认真干活！现在时间是——算了不重要。」','「人类造房子要几个月。我们直接住人类造好的房子！这就是效率！」',
  '「我感觉我跟一颗闪亮亮产生了灵魂共鸣……它爱我，我爱它，中间隔着别人的钱包。」','「妈妈说，不能拿别人的东西。我不是拿，我是用拳头交换。」',
];

function msg(html){$('msg').innerHTML=html;}
function updateUI(){
  $('sc').textContent=shiny;$('mc').textContent=meat;
  $('goalDisplay').textContent='10000';
  const rc=getRC();$('recBtn').className='ab'+(shiny>=rc.s&&meat>=rc.m?'':' lk');
  $('recCost').textContent=`${rc.s}✨ ${rc.m}🥩 | ${goblins.length}只`;
  const uc=getUC();$('upgBtn').className='ab'+(shiny>=uc.s&&meat>=uc.m?'':' lk');
  $('upgCost').textContent=`Lv.${caveLevel} → ${uc.s}✨ ${uc.m}🥩`;
  renderTribe();

  // 检查通关
  if(totalEarned>=GOAL&&!endGame) showEnd();
}

function getRC(){const m=Math.pow(1.4,goblins.length);return{s:Math.floor(30*m),m:Math.floor(15*m)};}
function getUC(){return{s:60*caveLevel,m:25*caveLevel};}

// ===== 点击 =====
$('cave').addEventListener('click',function(e){
  if(endGame)return;
  const earn=1+Math.floor(caveLevel*0.5)+Math.floor(goblins.length*0.3);
  shiny+=earn;totalEarned+=earn;clicks++;updateUI();
  const el=document.createElement('div');el.className='ce';
  el.textContent=`+${earn}✨`;const r=this.getBoundingClientRect();
  el.style.left=(e.clientX-r.left-10)+'px';el.style.top=(e.clientY-r.top-20)+'px';
  this.appendChild(el);setTimeout(()=>el.remove(),1000);
  const gk=$('gk');gk.classList.add('shake');setTimeout(()=>gk.classList.remove('shake'),300);
  if(Math.random()<0.1) msg(rnd(C));
  if(Math.random()<0.02) triggerEvent();
});

// ===== 打劫 =====
function raid(){
  if(raidCD){msg('⏳ 哥布林们还在数上次抢到的东西！');return;}
  if(shiny<10){msg('🐸 10✨都没有怎么启动战争机器？！去赚！');return;}
  shiny-=10;
  const rs=20+Math.floor(Math.random()*31)+caveLevel*3;
  const rm=5+Math.floor(Math.random()*11)+caveLevel*2;
  shiny+=rs;meat+=rm;totalEarned+=rs;raidCD=true;
  msg(`${rnd(R)}<br>获得 <span class="s">+${rs}✨</span> <span class="h">+${rm}🥩</span>`);
  updateUI();$('raidCD').style.width='100%';
  setTimeout(()=>{raidCD=false;$('raidCD').style.width='0%';},3000+caveLevel*500);
  if(Math.random()<0.2) setTimeout(()=>{const g=rnd(goblins);
    msg(`🐸 ${g.name}在抢劫中捡到一本《如何成为更好的人》——当场撕了。「它说不要抢劫，这书有问题！」`);},1000);
}

// ===== 狩猎 =====
function hunt(){
  if(huntCD){msg('⏳ 狩猎队还没回来！可能在森林里迷路了……也可能在睡觉。');return;}
  if(shiny<5){msg('🐸 5✨都不给？弓箭也是要钱的好吗！');return;}
  shiny-=5;const rr=10+Math.floor(Math.random()*16)+caveLevel*2;meat+=rr;huntCD=true;
  msg(`${rnd(H)}<br>获得 <span class="h">+${rr}🥩</span>`);updateUI();
  setTimeout(()=>huntCD=false,2000+Math.floor(Math.random()*1000));
}

// ===== 招募 =====
function recruit(){
  const c=getRC();
  if(shiny<c.s||meat<c.m){msg('🐸 资源不够！你以为招募是免费的？哥布林虽然傻但不白干！');return;}
  shiny-=c.s;meat-=c.m;
  const name=NAMES[goblins.length%NAMES.length];
  goblins.push({name,emo:'🐸'});updateUI();
  const msgs=[
    `🎉 「${name}」加入了部落！面试环节——他说他擅长抢东西。当场录取。`,
    `🎉 「${name}」来了！他环顾四周说"就这？"然后开始翻找值钱的东西。好样的！`,
    `🎉 新成员「${name}」报到！他的爱好：抢。特长：抢。梦想：抢更多。完美。`,
    `🎉 「${name}」加入了！他带来的行李只有一颗闪亮亮——他以为是来上交的。其实是来领赏的。`,
  ];
  msg(rnd(msgs));
  if(goblins.length===5&&!autoInt) startAuto();
  if(goblins.length===8) msg('👑 8只哥布林——可以组两个足球队互相抢劫了！');
  if(goblins.length===12) msg('🏆 12只！你的部落已经上了冒险者公会的黑名单！恭喜！');
}

function startAuto(){
  autoInt=setInterval(()=>{
    if(endGame)return;
    const earn=goblins.length*0.3+Math.random()*1.5;
    shiny+=Math.floor(earn);totalEarned+=Math.floor(earn);updateUI();
    if(Math.random()<0.1) msg(`🐸 ${rnd(goblins).name}上缴了保护费！<span class="s">+${Math.floor(earn)}✨</span>`);
  },4000);
}

// ===== 升级 =====
function upgrade(){
  const c=getUC();
  if(shiny<c.s||meat<c.m){msg('🐸 升级？你连材料都买不起！去抢劫攒钱吧！');return;}
  shiny-=c.s;meat-=c.m;caveLevel++;updateUI();
  const msgs=[
    `🛠️ 洞穴 Lv.${caveLevel}！新增设施：一个歪架子、一些神秘骨头、以及更多蟑螂。`,
    `🛠️ 叮叮当当！Lv.${caveLevel}！工匠用泥巴、树枝和梦想完成了扩建！`,
    `🛠️ Lv.${caveLevel}！新开了一扇"窗户"——其实就是墙上多了个洞。采光变好了！也变冷了！`,
    `🛠️ 洞穴升级！Lv.${caveLevel}！你给新房间取名叫"闪亮亮陈列室"——虽然里面空空的。但听起来气派！`,
  ];
  msg(rnd(msgs));
  if(caveLevel===3) setTimeout(()=>showEvent('🌟','大众点评星级','你的洞穴在"大众点评"上获得了一星好评！原因是"太臭了"。你把它裱起来挂在墙上。',()=>{}),500);
  if(caveLevel===5){
    $('gk').textContent='🐲';
    showEvent('🐲','哥布林王进化！','你吸收了足够多的闪亮亮能量……进化成了哥布林龙！！（其实就是头上戴了个纸皇冠）但不许质疑！',()=>{});
    $('gk').style.animation='idle 3s ease-in-out infinite, rainbow 2s linear infinite';
    document.querySelector('.container').style.borderColor='rgba(255,215,0,.3)';
  }
  if(caveLevel===7) setTimeout(()=>showEvent('🏰','城堡称号','你的洞穴已经大到需要门牌号了！你给它取名"闪亮亮城堡·哥布林皇家行宫"。隔壁鼠人邻居投诉你太吵。',()=>{}),500);
  if(caveLevel===10) setTimeout(()=>showEvent('💎','哥布林帝国','Lv.10！你的洞穴已经发展成了地下城市！有街道、有市场、还有一个专门存放闪亮亮的金库——虽然大部分时候是空的。',()=>{}),500);
}

// ===== 随机事件 =====
function triggerEvent(){
  if(eventActive||endGame)return;
  const e=rnd(E);showEvent(e.icon,e.title,e.desc,e.fx);
}

function showEvent(icon,title,desc,fx){
  eventActive=true;
  $('evIcon').textContent=icon;$('evTitle').textContent=title;$('evDesc').textContent=desc;
  $('eventPop').style.display='block';
  $('eventPop').dataset.fx=String(fx);
}

function closeEvent(){
  $('eventPop').style.display='none';eventActive=false;
  const fxStr=$('eventPop').dataset.fx;
  if(fxStr&&fxStr!=='undefined'){
    // 找到对应事件并执行
    const e=E.find(e2=>e2.title===$('evTitle').textContent);
    if(e&&e.fx) e.fx();
    updateUI();
    msg(`🌊 事件结束！当前财产：<span class="s">${shiny}✨</span> <span class="h">${meat}🥩</span>`);
  }
}

// 定时事件
setInterval(()=>{
  if(!eventActive&&!endGame&&Math.random()<0.35) triggerEvent();
}, 18000);

// ===== 哥布林碎碎念 =====
setInterval(()=>{
  if(goblins.length>0&&!endGame){
    const g=rnd(goblins);
    const msgs=[
      `🐸 洞穴里传来${g.name}的声音：${rnd(TALK)}`,
      `🐸 ${g.name}对着影子练习抢劫台词：「把闪亮亮交出来！不然我……我……呃……算了你把闪亮亮给我就行。」`,
      `🐸 ${g.name}宣布今天是全国发呆日。所有哥布林积极响应。生产力下降100%。`,
      `🐸 你听到${g.name}在和一只蜈蚣争论谁的腿多。目前比分：蜈蚣领先。`,
      `🐸 ${g.name}尝试数清楚部落总共有多少颗闪亮亮。数到三的时候忘了。重新开始。`,
      `🐸 ${g.name}在角落里偷偷练习微笑——看起来像在抽筋。但他很满意。`,
    ];
    msg(rnd(msgs));
  }
}, 12000);

function renderTribe(){
  const el=$('tribe');el.innerHTML='';
  goblins.forEach((g,i)=>{
    const d=document.createElement('div');d.className='gu';
    d.textContent=g.emo;d.innerHTML+=`<div class="t">${g.name}</div>`;
    d.onclick=()=>{if(!endGame)msg(`🐸 ${g.name}${rnd(TALK)}`);};
    el.appendChild(d);
  });
}

// ===== 结局 =====
function showEnd(){
  endGame=true;
  if(autoInt) clearInterval(autoInt);
  const descs=[
    '🐲 10000 颗闪亮亮！！！你做到了！！！<br>你的哥布林帝国从一个小小的洞穴发展成了横跨大陆的超级势力！<br>人类王国集体投降，表示愿意每年进贡闪亮亮换取和平。<br>你被封为"万王之王、闪亮亮之主、哥布林の神"——<br>而你的洞穴，现在挂牌上市了！股票简称：哥布林（代码：GLN）',
    '👑 10000 颗闪亮亮！你创造了历史！<br>你的哥布林部落已经发展成了一个真正的文明！<br>——当然，这个文明的GDP99%来自抢劫。<br>但谁在乎呢？你现在住在用闪亮亮砌成的城堡里！<br>你的王座是用纯金打造的——虽然你坐着总觉得硌屁股。',
    '🏆 哥布林之神！！！<br>你用10000颗闪亮亮统一了整个大陆！<br>史书上记载：那个绿皮怪物……哦不，那位伟大的哥布林帝王，<br>从一个潮湿的洞穴开始，最终建立了史上最大的闪亮亮帝国。<br>你的雕像被立在每个村庄的广场上——<br>村民们不是要纪念你，而是在雕像下面埋了陷阱防止你再来抢。',
  ];
  $('endDesc').innerHTML=rnd(descs);
  $('endClicks').textContent=clicks;
  $('endGoblins').textContent=goblins.length;
  $('endLevel').textContent=caveLevel;
  setTimeout(()=>{$('endScreen').classList.add('show');},800);
}

updateUI();
</script>
</body>
</html>
